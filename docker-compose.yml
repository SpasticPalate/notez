version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: notez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notez}
      POSTGRES_USER: ${POSTGRES_USER:-notez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notez}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Notez Application
  notez:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notez-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-notez}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-notez}

      # Server
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}

      # JWT Secrets (CHANGE THESE IN PRODUCTION!)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh-secret}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production-cookie-secret}

      # Encryption Key for AI API keys (CHANGE THIS IN PRODUCTION!)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production-encryption-key-32-chars-min}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

volumes:
  postgres_data:
    driver: local
